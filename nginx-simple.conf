server {
    listen 80;
    server_name mods.eumarko.com www.mods.eumarko.com;
    
    root /var/www/mods.eumarko.com;
    index index.html;
    
    # Logs
    access_log /var/log/nginx/mods.eumarko.com.access.log;
    error_log /var/log/nginx/mods.eumarko.com.error.log;
    
    # Configurações de upload
    client_max_body_size 100M;
    
    # API Backend - Proxy para Express.js
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Uploads
    location /uploads/ {
        alias /var/www/mods.eumarko.com/uploads/;
        expires 1y;
    }
    
    # Frontend - React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Bloquear arquivos sensíveis
    location ~ /\. {
        deny all;
    }
    
    location ~ /(\.env|\.git|package\.json|node_modules) {
        deny all;
    }
}
